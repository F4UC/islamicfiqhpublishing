name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: articles.json — parse + unique ids
        run: |
          node -e "const a=require('./articles.json');const arr=Array.isArray(a)?a:(a.articles||Object.values(a)[0]);const ids=arr.map(x=>x.id);if(new Set(ids).size!==ids.length){console.error('duplicate id in articles.json');process.exit(1)}console.log('articles.json OK:',arr.length,'entries')"

      - name: JSON data files — valid JSON
        run: |
          for f in $(find pages/tools/ijazah-data -name '*.json'); do
            python3 -c "import json,sys;json.load(open(sys.argv[1],encoding='utf-8'))" "$f" || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "all ijazah-data JSON valid"

      - name: Arabic orthography gate (articles)
        run: python3 scripts/lint-arabic-ortho.py $(find articles -name '*.html')

      - name: House-style lint (informational, non-blocking)
        continue-on-error: true
        run: node scripts/lint-article.js $(find articles -name '*.html')

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks — secret scan (working tree)
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --redact --no-banner
