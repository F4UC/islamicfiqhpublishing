  (function() {
    var s = localStorage.getItem('theme');
    var d = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (s === 'dark' || (!s && d)) document.documentElement.classList.add('dark-mode');
  })();
</script>

<style>
body { position: relative; }

#readingProgressBar {
  position: fixed; top: 0; left: 0; width: 0%; height: 4px;
  background: var(--accent-color); z-index: 9999; transition: width 0.1s ease-out;
}

.article-body p, .lead-text {
  line-height: 2.0; margin-bottom: 24px; text-align: left;
  word-break: break-word; color: var(--text-secondary);
}
.lead-text { font-size: 17px; color: var(--text-primary); font-weight: 400; }

/* SOP B.2 — ar-feature: unified centered Arabic block, no side border */
.ar-feature {
  font-family: 'Amiri', serif;
  direction: rtl; text-align: center;
  font-size: 1.6rem; line-height: 2.1;
  color: var(--text-primary);
  padding: 24px 24px; margin: 28px 0;
  background: rgba(255,255,255,0.02);
}
.ar-translation {
  color: var(--text-tertiary);
  margin: -12px 0 28px;
  line-height: 2.0;
  font-style: italic;
}

/* SOP B.3 — ar-toggle: Arabic blocks collapsed by default */
.ar-toggle { margin: 8px 0 24px; }
.ar-toggle > summary {
  cursor: pointer; list-style: none;
  font-family: 'IBM Plex Sans Thai', sans-serif; font-size: .9rem;
  color: var(--text-tertiary); padding: 6px 0; user-select: none;
  border-bottom: 0.5px solid var(--border-secondary); display: inline-block;
}
.ar-toggle > summary::-webkit-details-marker { display: none; }
.ar-toggle > summary:hover { color: var(--accent-color); }
.ar-toggle[open] > summary { color: var(--accent-color); margin-bottom: 10px; }
.ar-toggle .ar-block {
  font-family: 'Amiri', serif;
  direction: rtl; text-align: right;
  font-size: 1.45rem; line-height: 2.1;
  color: var(--text-secondary);
  padding: 8px 16px;
  border-right: 2px solid rgba(179,27,27,0.5);
  margin: 8px 0;
}

/* SOP B.1 — ar-inline */
.ar-inline {
  font-family: 'Amiri', serif;
  font-size: 1.15em;
  direction: rtl;
  vertical-align: middle;
  unicode-bidi: isolate;
}

/* SOP B.6 — article-summary */
.article-summary {
  margin: 24px 0 32px 0;
  padding-left: 28px;
  list-style: decimal;
}
.article-summary li {
  margin-bottom: 28px;
  line-height: 2.0;
  color: var(--text-secondary);
  word-break: break-word;
}
.article-summary li strong {
  color: var(--text-primary);
  display: block;
  margin-bottom: 4px;
}

/* article-h2 */
.article-h2 {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  margin: 48px 0 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-primary);
}

/* Citation box */
.citation-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent-color);
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.citation-label::before { content: '❝'; font-size: 18px; line-height: 0; position: relative; top: 4px; }
.citation-footer { display: flex; justify-content: flex-end; }
.copy-alert {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(30px);
  background: var(--text-primary); color: var(--bg-primary); padding: 12px 30px; border-radius: 30px;
  font-size: 14px; font-weight: 600; opacity: 0; visibility: hidden; z-index: 10000;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.copy-alert.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

/* Related articles */
.related-section { max-width: 880px; margin: 0 auto; padding: 64px 24px 80px; }
.related-title {
  font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 1.2rem; font-weight: 500;
  color: var(--text-primary); margin: 0 0 4px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border-primary);
}
.related-list { display: flex; flex-direction: column; }
.related-row {
  position: relative; display: block; text-decoration: none; color: inherit;
  padding: 22px 0 22px 20px; border-bottom: 1px solid var(--border-primary);
}
.related-row::before {
  content: ''; position: absolute; left: 0; top: 22px; bottom: 22px;
  width: 2px; background: var(--accent-color);
  transform: scaleY(0); transform-origin: top; transition: transform 0.28s ease;
}
.related-row:hover::before { transform: scaleY(1); }
.related-article-category {
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--accent-color); margin-bottom: 7px; display: block;
}
.related-article-title {
  font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 1.05rem; font-weight: 500;
  color: var(--text-primary); line-height: 1.5; margin: 0 0 6px;
  transition: color 0.22s ease;
}
.related-row:hover .related-article-title { color: var(--text-secondary); }
.related-article-excerpt {
  font-family: 'Sarabun', sans-serif; font-size: 0.9rem; color: var(--text-tertiary);
  line-height: 1.6; margin: 0;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}

/* Back to top */
#backToTopBtn {
  position: fixed; bottom: 30px; right: 30px; display: none;
  background: var(--accent-color); color: #fff; border: none;
  width: 44px; height: 44px; border-radius: 50%; font-size: 18px;
  cursor: pointer; z-index: 1000; transition: all 0.3s;
}
#backToTopBtn:hover { transform: translateY(-3px); }

/* Footnotes + Bibliography */
.fn-ref { font-size: 0.72em; line-height: 0; vertical-align: super; }
.fn-ref a { color: #a01818; text-decoration: none; padding: 0 1px; }
.fn-ref a:hover { text-decoration: underline; }
.bibliography-section { margin-top: 8px; }
.bibliography { margin: 18px 0 0; padding-left: 1.5em; list-style: decimal; }
.bibliography li {
  font-family: 'Sarabun', sans-serif; font-size: 15px; line-height: 1.9;
  color: var(--text-primary); margin-bottom: 14px; word-break: break-word;
}
.fn-back { color: #a01818; text-decoration: none; margin-left: 6px; font-weight: 700; }
.fn-back:hover { text-decoration: underline; }

@media (max-width: 640px) {
  .related-section { padding: 48px 20px 64px; }
  #backToTopBtn { bottom: 20px; right: 20px; }
  .article-summary { padding-left: 20px; }
}
@media (prefers-reduced-motion: reduce) {
  .ar-toggle, .copy-btn { transition: none; }
}
</style>
</head>
<body id="article-page" class="ifp-tools-page" lang="th" data-article-id="{{ARTICLE_ID}}">

<div id="readingProgressBar"></div>

<button onclick="scrollToTop()" id="backToTopBtn" title="กลับขึ้นบนสุด">↑</button>

    src="{{HERO_IMAGE_URL}}"

    height="900"

  <div class="article-feature-content">
    <div class="article-feature-inner">
      <a href="{{CATEGORY_URL}}" class="article-feature-eyebrow">{{CATEGORY_LABEL}}</a>

    </div>
    <p class="article-feature-credit">{{HERO_CREDIT}}</p>

</div>

<article>
<div class="article-wrap">

  <div class="article-meta"></div>

  <div class="reading-tools">
    <div class="tool-group">
      <span class="tool-label">Appearance:</span>
      <button class="btn-tool" onclick="toggleDarkMode()" id="darkBtn">Night Mode 🌙</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">Font Size:</span>
      <button class="btn-tool" onclick="changeFontSize(-2)">A-</button>
      <button class="btn-tool" onclick="changeFontSize(0)">Normal</button>
      <button class="btn-tool" onclick="changeFontSize(2)">A+</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">ตัวบทอาหรับ:</span>
      <button class="btn-tool active" onclick="setArabicDisplay('hide')" id="arabicHideBtn">ซ่อน</button>
      <button class="btn-tool" onclick="setArabicDisplay('show')" id="arabicShowBtn">แสดง</button>
    </div>
  </div>

  <div class="article-body" id="main-content">

    {{BODY}}

    <div class="citation-box" id="citation-area">
      <div class="citation-label">อ้างอิงบทความนี้</div>
      <div class="citation-text" id="citation-text">กองบรรณาธิการ. ({{YEAR_BE}}). {{TITLE}}. Islamic Fiqh Publishing. สืบค้นจาก {{CANONICAL_URL}}</div>
      <div class="citation-footer">
        <button class="copy-btn" onclick="copyCite()">คัดลอกอ้างอิง</button>
      </div>
    </div>

  </div>

  {{BIBLIOGRAPHY}}

</div>
</article>

<section class="related-section reveal">
  <h2 class="related-title">บทความที่เกี่ยวข้อง</h2>
  <div class="related-list"></div>
</section>

<div id="footer-placeholder"></div>

<div class="copy-alert" id="copyAlert">คัดลอกแล้ว ✓</div>

<script>
// Scroll-reveal animation (Rule 35) — toggles .active per article.css.
// Font-size, dark mode, progress bar and back-to-top are handled globally by main.js.
document.querySelectorAll('.reveal').forEach(function(el) {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('active'); obs.unobserve(e.target); } });
  }, {threshold: 0.1});
  obs.observe(el);
});
</script>

</body>
