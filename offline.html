<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ออฟไลน์ — Islamic Fiqh Publishing</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#06101e">
<link rel="icon" href="/favicon.png?v=2" type="image/png">
<!-- Self-contained: no external CSS/JS/fonts so it renders fully offline. -->
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #06101e;
    color: #e3edf7;
    font-family: 'Sarabun', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 32px; line-height: 1.7;
  }
  .wrap { max-width: 420px; }
  .mark {
    font-family: 'IBM Plex Serif', Georgia, 'Times New Roman', serif;
    font-weight: 700; font-size: 56px; letter-spacing: 2px;
    color: #ffffff; margin: 0 0 24px;
  }
  h1 { font-size: 22px; font-weight: 600; color: #ffffff; margin: 0 0 6px; }
  .en { font-size: 15px; color: rgba(227,237,247,0.6); margin: 0 0 28px; letter-spacing: 0.3px; }
  p { font-size: 15px; color: rgba(227,237,247,0.82); margin: 0 0 28px; }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: #3b82f6; color: #ffffff;
    font-family: inherit; font-size: 15px; font-weight: 600;
    padding: 12px 28px; border-radius: 10px;
    transition: transform .15s ease, opacity .15s ease;
  }
  button:hover { transform: translateY(-2px); opacity: 0.92; }
  .hint { margin-top: 22px; font-size: 13px; color: rgba(227,237,247,0.5); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">IF</div>
    <h1>คุณกำลังออฟไลน์</h1>
    <p class="en">You're offline</p>
    <p>ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้ในขณะนี้ หน้าที่คุณเปิดไว้ก่อนหน้านี้อาจยังอ่านได้ ลองเชื่อมต่อใหม่แล้วโหลดอีกครั้ง</p>
    <button type="button" onclick="location.reload()">ลองใหม่ / Retry</button>
    <div class="hint">Islamic Fiqh Publishing</div>
  </div>
</body>
</html>
