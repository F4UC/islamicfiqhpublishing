/* --- Premium Dynamic Color System --- */
:root {
  --bg-primary: #e3edf7;
  --bg-secondary: #d6e2ee;
  --bg-tertiary: #c8d7e5;
  --text-primary: #111111;
  --text-secondary: #444444;
  --text-tertiary: #777777;
  --text-quaternary: #888888;
  --border-primary: rgba(0,50,100,0.06);
  --border-secondary: rgba(0,50,100,0.12);
  --ink: var(--bg-primary); --ink-2: var(--bg-secondary); --ink-3: var(--bg-tertiary);
  --ink-4: var(--border-secondary); --paper: var(--text-primary); --paper-2: var(--text-secondary);
  --bone: #556270; --text: var(--text-primary); --text-dim: var(--text-secondary);
  --text-mute: var(--text-tertiary); --gold: #b31b1b; --gold-bright: #d32f2f;
  --rule: rgba(0,50,100,0.06); --rule-strong: rgba(0,50,100,0.12);
  --serif: 'Cormorant Garamond', 'EB Garamond', Georgia, serif;
  --thai: 'Sarabun', system-ui, sans-serif;
  --arabic: 'Amiri', serif;
  --ui: 'D-DIN', 'Inter', system-ui, sans-serif;
  --accent-color: #b31b1b;
  --inverted-bg: #0a0c10; --inverted-text: #e8e0d0;
  --footer-bg: #050403; --footer-border: rgba(232,224,208,.14);
  --shadow-color: rgba(0,50,100,0.08); --shadow-heavy: rgba(0,50,100,0.15);
  --theme-transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
}

html.dark-mode {
  --bg-primary: #0a0907;
  --bg-secondary: #14110d;
  --bg-tertiary: #1d1814;
  --text-primary: #e8e0d0;
  --text-secondary: #9a907e;
  --text-tertiary: #6b6357;
  --text-quaternary: #6a8099;
  --border-primary: rgba(232,224,208,0.12);
  --border-secondary: rgba(232,224,208,0.24);
  --ink: var(--bg-primary); --ink-2: var(--bg-secondary); --ink-3: var(--bg-tertiary);

  --bone: #9a907e; --text: var(--text-primary); --text-dim: var(--text-secondary);
  --text-mute: var(--text-tertiary); --rule: rgba(232,224,208,.14); --rule-strong: rgba(232,224,208,.32);

  --shadow-color: rgba(0,0,0,0.4); --shadow-heavy: rgba(0,0,0,0.6);
}

}

/* --- 1. สไตล์พื้นฐาน --- */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun',sans-serif;
  color:var(--text-primary);
  background:var(--bg-primary);
  font-size:16px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  transition:var(--theme-transition);
}
a{text-decoration:none;color:inherit;transition:color 0.2s ease;}

/* ─── PAGE HERO ─────────────────────────────────────────────────── */
:root{--ph-paper:#111111;--ph-dim:#444444;--ph-gold:#b31b1b;--ph-serif:'Cormorant Garamond',Georgia,serif;--ph-thai:'Sarabun',sans-serif}
html.dark-mode{--ph-paper:#f0f4ff;--ph-dim:#b8c8e0}
.page-hero{min-height:52vh;padding:90px 0 60px;text-align:center;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.page-hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 50% at 80% 18%,rgba(59,130,246,.10),transparent 60%),radial-gradient(80% 60% at 10% 90%,rgba(59,130,246,.05),transparent 70%)}
html.dark-mode .page-hero::before{background:radial-gradient(60% 50% at 80% 18%,rgba(59,130,246,.06),transparent 60%),radial-gradient(80% 60% at 10% 90%,rgba(59,130,246,.03),transparent 70%)}
.page-hero-inner{max-width:800px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
.page-display{font-family:var(--ph-serif);font-weight:600;font-size:clamp(40px,11vw,140px);line-height:1.05;letter-spacing:-.02em;color:var(--ph-paper)}
.page-display em{font-style:italic;color:var(--ph-gold);font-weight:400}
.page-display .br{display:block}
.hero-meteors{position:relative;width:180px;height:70px;margin:24px auto;overflow:hidden}
.hero-meteors .meteor{position:absolute;width:1px;background:linear-gradient(to bottom,transparent 0%,var(--ph-gold) 50%,transparent 100%);opacity:0;animation:meteor-drop var(--dur) var(--delay) ease-in infinite}
@keyframes meteor-drop{0%{transform:translateY(-36px);opacity:0}18%{opacity:.9}85%{opacity:.5}100%{transform:translateY(95px);opacity:0}}
.hero-meteors .meteor:nth-child(1){left:50px;height:40px;width:1.5px;--dur:2.6s;--delay:0s}
.hero-meteors .meteor:nth-child(2){left:90px;height:34px;--dur:3.0s;--delay:.9s}
.hero-meteors .meteor:nth-child(3){left:130px;height:40px;width:1.5px;--dur:2.8s;--delay:1.8s}
.page-hero-sub{max-width:560px;margin:0 auto;font-family:var(--ph-thai);font-weight:400;font-size:16px;line-height:1.8;color:var(--ph-dim)}
.page-hero-sep{height:1px;background:rgba(0,50,100,0.08);max-width:900px;margin:0 auto 48px}
html.dark-mode .page-hero-sep{background:rgba(232,224,208,.12)}
@media(max-width:640px){.page-hero{min-height:30vh;padding:40px 0 28px}}

/* --- Article List (Empty State) --- */
.article-list { max-width: 800px; margin: 0 auto 80px; padding: 0 24px; }
.empty-state { text-align: center; padding: 80px 24px; border: 1px dashed var(--border-primary); background: var(--bg-secondary); margin-top: 32px; transition: var(--theme-transition); }
.empty-icon { font-family: 'Amiri', serif; font-size: 42px; color: var(--border-primary); margin-bottom: 16px; line-height: 1; transition: var(--theme-transition); }
.empty-title { font-family: 'Sarabun', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; transition: var(--theme-transition); }
.empty-desc { font-size: 15px; color: var(--text-quaternary); transition: var(--theme-transition); }

/* ========================================== */
/* CSS สำหรับเมนูและ Footer ที่จะถูกดึงเข้ามา */
/* ========================================== */
.topbar { background: var(--inverted-bg); color: var(--inverted-text); text-align: center; font-size: 11px; letter-spacing: 2px; padding: 8px; font-family: 'Inter', sans-serif; text-transform: uppercase; transition: var(--theme-transition); }
header { padding: 28px 0 0; border-bottom: 2px solid var(--text-primary); position: relative; z-index: 1000; background: var(--bg-primary); transition: var(--theme-transition); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border-primary); transition: var(--theme-transition); }

.date-line { font-size: 14px; color: var(--text-secondary); font-family: 'Sarabun', sans-serif; font-weight: 500; letter-spacing: 0.5px; width: 180px; transition: var(--theme-transition); }
.logo-block { text-align: center; flex: 1; }
.logo-en { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1; color: inherit; }
.logo-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--text-secondary); direction: rtl; margin-top: 6px; line-height: 1.5; transition: var(--theme-transition); }
.header-right { width: 160px; display: flex; justify-content: flex-end; align-items: center; }
.spacer { width: 100%; }

.menu-toggle { display: none !important; } 

nav { display: flex; justify-content: center; margin-top: 12px; transition: var(--theme-transition); }
.nav-item { font-size: 13px; font-weight: 500; padding: 10px 20px; color: var(--text-secondary); border-right: 1px solid var(--border-primary); cursor: pointer; transition: var(--theme-transition); }
.nav-item:first-child { border-left: 1px solid var(--border-primary); }
.nav-item:hover { color: var(--text-primary); }
.nav-item.active { color: var(--text-primary); border-bottom: 2px solid var(--text-primary); }

footer { background: var(--footer-bg); color: var(--inverted-text); padding: 40px 0 24px; border-top: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; text-align: center; }
.footer-logo { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; color: var(--inverted-text); transition: var(--theme-transition); }
.footer-ar { font-family: 'Amiri', serif; font-size: 17px; color: var(--text-quaternary); direction: rtl; margin-bottom: 28px; line-height: 1.6; transition: var(--theme-transition); }
.footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-links a { font-size: 13px; color: #bbbbbb; letter-spacing: .5px; transition: var(--theme-transition); text-decoration: none; }
.footer-links a:hover { color: var(--inverted-text); }
.footer-copy { font-family: 'Inter', sans-serif; font-size: 14px; color: #888888; font-style: normal; letter-spacing: 0.5px; transition: var(--theme-transition); }

/* --- Reading Progress Bar --- */
#readingProgress{position:fixed;top:0;left:0;height:2px;width:0%;background:var(--gold);z-index:9999;transition:width .1s linear;}

/* --- Back to Top Button --- */
#backToTopBtn{
  display:none;position:fixed;bottom:32px;right:32px;z-index:500;
  width:48px;height:48px;
  border:1px solid var(--border-primary);border-radius:50%;
  background:rgba(10,12,16,0.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--text-secondary);
  box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.05);
  transition:all .35s cubic-bezier(.2,.7,.2,1);cursor:pointer;
  place-items:center;padding:0;
}
#backToTopBtn svg{transition:transform 0.3s ease;}
#backToTopBtn:hover{
  border-color:var(--gold);color:var(--gold);
  background:rgba(10,12,16,0.90);transform:translateY(-5px);
  box-shadow:0 12px 40px rgba(59,130,246,0.18),0 8px 32px rgba(0,0,0,0.36);
}
#backToTopBtn:hover svg{transform:translateY(-3px);}

/* --- Scroll Reveal --- */
[data-reveal]{opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);}
[data-reveal].is-in{opacity:1;transform:none;}
[data-reveal][data-delay="1"]{transition-delay:.08s;}
[data-reveal][data-delay="2"]{transition-delay:.16s;}
[data-reveal][data-delay="3"]{transition-delay:.24s;}
[data-reveal][data-delay="4"]{transition-delay:.32s;}

/* --- โหมดมือถือ (Mobile Responsive) --- */
@media(max-width:768px){
  .logo-en { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1; color: inherit; }
  .logo-ar { font-size: 14px; }
  .date-line { display: none; }
  .header-right { width: auto; }
  .spacer { display: none; }
  
  .menu-toggle { 
    display: block !important; 
    font-size: 24px; 
    cursor: pointer; 
    color: var(--text-primary); 
    transition:var(--theme-transition);
  }
  nav { 
    display: none; 
    flex-direction: column; 
    position: absolute; 
    top: 100%; 
    left: 0; 
    width: 100%; 
    background: var(--bg-primary); 
    box-shadow: 0 10px 20px var(--shadow-color); 
    margin-top: 0;
    padding: 10px 0;
    border-bottom: 2px solid var(--text-primary);
    transition:var(--theme-transition);
  }
  nav.mobile-active { display: flex; } 
  .nav-item { 
    border: none !important; 
    border-bottom: 1px solid var(--border-secondary) !important; 
    padding: 16px 24px; 
    font-size: 16px; 
    text-align: left; 
  }
  .nav-item:last-child { border-bottom: none !important; }
  .nav-item.active { background: var(--bg-secondary); border-bottom: 1px solid var(--border-secondary) !important; border-left: 4px solid var(--text-primary) !important; }
}
</style>

<script src="/main.js?v=20260525"></script>
<script>
(function(){
  var bar = document.getElementById('readingProgress');
  if(bar){
    window.addEventListener('scroll',function(){
      var st = document.documentElement.scrollTop;
      var sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      bar.style.width = (sh > 0 ? (st/sh*100) : 0) + '%';
    });
  }
  window.addEventListener('scroll',function(){
    var btn = document.getElementById('backToTopBtn');
    if(!btn) return;
    btn.style.display = (document.documentElement.scrollTop > 400) ? 'grid' : 'none';
  });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('is-in'); io.unobserve(en.target); } });
  },{threshold:.12});
  document.querySelectorAll('[data-reveal]').forEach(function(el){
    var r = el.getBoundingClientRect();
    if(r.top < window.innerHeight && r.bottom > 0){ el.classList.add('is-in'); }
    else { io.observe(el); }
  });
})();
</script>
