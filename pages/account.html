<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<script>
  (function() {
    var savedTheme = localStorage.getItem('theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark-mode');
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="เข้าสู่ระบบและจัดการบัญชีผู้ใช้ Islamic Fiqh Publishing">

<link rel="icon" href="../favicon.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="../favicon.png?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="../favicon.png?v=2">

<link rel="stylesheet" href="../article.css?v=20260614d">
<link rel="stylesheet" href="../css/tokens.css?v=20260529n">

<link rel="preload" as="font" type="font/woff2" href="/fonts/amiri-400-arabic.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/fonts/sarabun-400-thai.woff2" crossorigin>
<link rel="stylesheet" href="/css/fonts.css?v=20260614a">
<style>
  .acct-wrap { max-width: 560px; margin: 0 auto; padding: 80px 20px 120px; text-align: center; }
  .acct-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-primary);
    border-radius: 16px;
    padding: 44px 32px;
    box-shadow: 0 8px 28px var(--shadow-color);
  }
  .acct-card h1 {
    font-family: var(--thai);
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 14px;
  }
  .acct-card p {
    font-family: var(--thai);
    font-size: 15px;
    line-height: 2.0;
    color: var(--text-secondary);
    margin: 0 0 8px;
  }
  /* Membership status card (populated by /api/tm/me once auth is known). */
  .acct-membership {
    margin-top: 26px; padding: 22px 24px;
    background: rgba(196,154,69,0.10);
    border: 1px solid rgba(196,154,69,0.35);
    border-radius: 12px;
    font-family: var(--thai); font-size: 16px; line-height: 1.9;
    color: var(--text-primary); text-align: center;
  }
  .acct-membership strong { color: #c49a45; }
  .acct-note { font-family: var(--thai); }
</style>
</head>
<body id="account-page" class="ifp-tools-page" lang="th">

<div id="readingProgress"></div>
<button id="backToTopBtn" title="กลับขึ้นบนสุด" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
<div id="header-placeholder"></div>

<main>
  <div class="acct-wrap">
    <div class="acct-card">
      <h1>บัญชีของฉัน</h1>
      <p>เข้าสู่ระบบเพื่อจัดการบัญชีและเข้าถึงเนื้อหาที่สมัครไว้ บทความและสายอิญาซะฮ์ยังคงเปิดให้อ่านฟรีโดยไม่ต้องเข้าสู่ระบบ</p>
      <div id="acct-membership" class="acct-membership" hidden></div>
      <p class="acct-note" style="font-size:13px;color:var(--text-tertiary);margin-top:18px">
        ประวัติการชำระเงินและการยกเลิกสมาชิกจะเปิดให้ใช้เมื่อระบบสมาชิกแบบชำระเงินพร้อม
      </p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script defer src="../main.js?v=20260619a"></script>
<!-- Clerk auth also loads site-wide via main.js (after header inject); this direct
     include is idempotent (guarded in clerk-auth.js) and keeps account self-sufficient. -->
<script defer src="../js/clerk-auth.js?v=20260629a"></script>
<script>
(function(){
  window.addEventListener('scroll',function(){
    var btn = document.getElementById('backToTopBtn');
    if(!btn) return;
    btn.style.display = (document.documentElement.scrollTop > 400) ? 'grid' : 'none';
  });
})();

// Membership status — clerk-auth.js (loaded site-wide by main.js after the header
// mounts) fires ifp:authready once Clerk knows the session.
window.addEventListener('ifp:authready', function () { loadMembership(); });
async function loadMembership() {
  var token = await window.ifpGetToken();
  var box = document.getElementById('acct-membership');
  if (!box) return;
  if (!token) { box.hidden = true; return; }
  try {
    var r = await fetch('/api/tm/me', { headers: { Authorization: 'Bearer ' + token } });
    var d = await r.json();
    if (!d || !d.authed) { box.hidden = true; return; }
    box.hidden = false;
    if (d.tier === 'free') {
      box.innerHTML = 'สถานะของคุณ: <strong>FIQH (ฟรี)</strong><br>' +
        '<span style="font-size:13px">อ่านอัลบิดายะฮ์ ฮ.ศ. 1–5 · บทความทั้งหมด</span><br>' +
        '<a href="/pages/membership.html" class="ifp-auth-btn" style="display:inline-block;margin-top:14px;text-decoration:none">ดูแพ็กเกจ FIQH+ / PRO</a>';
    } else {
      var name = d.tier === 'pro' ? 'FIQH PRO' : (d.tier === 'plus' ? 'FIQH+' : (d.planTitle || 'สมาชิก'));
      var when = '';
      if (d.periodEnd) {
        try { when = ' · ต่ออายุ ' + new Date(d.periodEnd.replace(' ', 'T') + 'Z')
          .toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' }); } catch(e){}
      }
      box.innerHTML = 'สถานะของคุณ: <strong>' + name + '</strong>' + when;
    }
  } catch (e) { box.hidden = true; }
}
</script>
</body>
</html>
