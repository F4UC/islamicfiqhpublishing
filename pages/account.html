<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<script>
  (function() {
    var savedTheme = localStorage.getItem('theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark-mode');
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัญชีของฉัน — Islamic Fiqh Publishing</title>

<meta name="description" content="เข้าสู่ระบบและจัดการบัญชีผู้ใช้ Islamic Fiqh Publishing">

<meta name="author" content="กองบรรณาธิการ Islamic Fiqh Publishing">

<link rel="apple-touch-icon" href="../favicon.png?v=2">

<style>
  .acct-wrap { max-width: 560px; margin: 0 auto; padding: 80px 20px 120px; text-align: center; }
  .acct-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-primary);
    border-radius: 16px;
    padding: 44px 32px;
    box-shadow: 0 8px 28px var(--shadow-color);
  }
  .acct-card h1 {
    font-family: var(--thai);
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 14px;
  }
  .acct-card p {
    font-family: var(--thai);
    font-size: 15px;
    line-height: 2.0;
    color: var(--text-secondary);
    margin: 0 0 8px;
  }
  /* Clerk login control (STEP 1 — identity only; opt-in) */
  .ifp-auth { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 28px; min-height: 40px; }
  .ifp-auth-btn { font-family: var(--thai); font-size: 15px; font-weight: 600; color: #fff; background: #c49a45; border: none; border-radius: 8px; padding: 11px 28px; cursor: pointer; transition: opacity .2s ease; }
  .ifp-auth-btn:hover { opacity: .88; }
</style>
</head>
<body id="account-page" class="ifp-tools-page" lang="th">

<div id="readingProgress"></div>
<button id="backToTopBtn" title="กลับขึ้นบนสุด" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg></button>
<div id="header-placeholder"></div>

<main>
  <div class="acct-wrap">
    <div class="acct-card">
      <h1>บัญชีของฉัน</h1>
      <p>เข้าสู่ระบบเพื่อจัดการบัญชีและเข้าถึงเนื้อหาที่สมัครไว้ บทความและสายอิญาซะฮ์ยังคงเปิดให้อ่านฟรีโดยไม่ต้องเข้าสู่ระบบ</p>
      <!-- Clerk login (STEP 1 — identity only; opt-in). Revealed by js/clerk-auth.js once Clerk loads. -->
      <div id="ifp-auth" class="ifp-auth" hidden>
        <button id="ifp-signin" type="button" class="ifp-auth-btn" hidden>เข้าสู่ระบบ</button>
        <span id="ifp-userbtn"></span>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script defer src="../main.js?v=20260619a"></script>
<!-- Clerk login (STEP 1 — identity only). Loaded ONLY here + the Time Machine page (opt-in). -->
<script defer src="../js/clerk-auth.js?v=20260625a"></script>
<script>
(function(){
  window.addEventListener('scroll',function(){
    var btn = document.getElementById('backToTopBtn');
    if(!btn) return;
    btn.style.display = (document.documentElement.scrollTop > 400) ? 'grid' : 'none';
  });
})();
</script>
</body>
</html>
