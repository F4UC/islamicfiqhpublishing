<style>
:root {
  --bg-primary: var(--ink);
  --bg-secondary: var(--ink-2);
  --bg-tertiary: var(--ink-3);
  --text-primary: var(--heading);
  --text-secondary: var(--text);
  --text-tertiary: var(--muted);
  --text-quaternary: var(--faint);
  --border-primary: var(--line);
  --border-secondary: var(--line-strong);
  --ink-4: var(--line-strong);
  --paper: var(--heading); --paper-2: var(--text);
  --bone: var(--muted); --text-dim: var(--text); --text-mute: var(--muted);
  --gold: var(--accent-deep); --gold-bright: var(--accent);
  --rule: var(--line); --rule-strong: var(--line-strong);
  --accent-color: var(--accent-deep);
  --inverted-bg: var(--ink-2); --inverted-text: var(--heading);
  --footer-bg: #050403; --footer-border: var(--line-strong);
  --shadow-color: rgba(0,0,0,0.4); --shadow-heavy: rgba(0,0,0,0.6);
  --theme-transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
}
#themeToggleBtn { display: none !important; }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;color:var(--text-primary);background:var(--bg-primary);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;transition:var(--theme-transition)}
a{text-decoration:none;color:inherit;transition:color 0.2s ease;}

.works-hero{padding:120px 24px 56px;text-align:center;border-bottom:1px solid var(--border-primary);background:var(--bg-primary)}
.works-hero-eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#c49a45;margin-bottom:16px}
.works-hero h1{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;font-weight:400;font-size:clamp(2.6rem,6vw,4.6rem);line-height:1.05;color:var(--text-primary);letter-spacing:-0.01em}
.works-hero-sub{max-width:620px;margin:18px auto 0;font-family:'Sarabun',sans-serif;font-size:16px;line-height:1.8;color:var(--text-tertiary)}

.works-wrap{max-width:1100px;margin:0 auto;padding:56px 24px 96px}
#works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:36px 28px}

.work-card{display:flex;flex-direction:column;background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:6px;overflow:hidden;transition:var(--theme-transition),border-color .25s ease}
.work-card:hover{border-color:#c49a45;box-shadow:0 16px 40px var(--shadow-color)}
.work-card.is-progress{opacity:.72}
.work-cover-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--bg-tertiary)}
.work-cover{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
.work-card:hover .work-cover{transform:scale(1.04)}
.work-badge{position:absolute;top:12px;left:12px;z-index:2;font-family:'Inter','Sarabun',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;padding:5px 10px;border-radius:999px}
.work-badge.published{background:#c49a45;color:#0a0907}
.work-badge.in-progress{background:rgba(255,255,255,0.12);color:var(--text-tertiary)}
.work-body{display:flex;flex-direction:column;gap:6px;padding:18px 18px 22px}
.work-title{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;font-weight:600;font-size:17px;line-height:1.4;color:var(--text-primary)}
.work-subtitle{font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text-tertiary);line-height:1.5}
.work-year{font-family:'Inter','Sarabun',sans-serif;font-size:12px;letter-spacing:.04em;color:var(--text-quaternary)}
.work-synopsis{font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.7;color:var(--text-secondary);margin-top:4px}
.work-preview-btn{margin-top:12px;align-self:flex-start;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;letter-spacing:.02em;padding:8px 16px;border:1px solid #c49a45;border-radius:4px;background:transparent;color:#c49a45;cursor:pointer;transition:background .2s ease,color .2s ease}
.work-preview-btn:hover{background:#c49a45;color:#0a0907}

.lb-overlay{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;background:rgba(5,4,3,0.92);padding:32px}
.lb-overlay.open{display:flex}
.lb-img{max-width:90vw;max-height:84vh;object-fit:contain;border-radius:4px;box-shadow:0 20px 60px var(--shadow-heavy)}
.lb-close,.lb-nav{position:absolute;background:rgba(255,255,255,0.08);border:1px solid var(--border-secondary);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s ease,border-color .2s ease}
.lb-close{top:24px;right:24px;width:44px;height:44px;font-size:22px;line-height:1}
.lb-nav{top:50%;transform:translateY(-50%);width:48px;height:48px;font-size:24px;line-height:1}
.lb-prev{left:24px}
.lb-next{right:24px}
.lb-close:hover,.lb-nav:hover{background:#c49a45;border-color:#c49a45;color:#0a0907}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Inter',sans-serif;font-size:13px;letter-spacing:.06em;color:var(--text-tertiary)}

.works-empty{text-align:center;padding:60px 0;color:var(--text-tertiary);font-family:'Sarabun',sans-serif}

.topbar { background: var(--inverted-bg); color: var(--inverted-text); text-align: center; font-size: 11px; letter-spacing: 2px; padding: 8px; font-family: 'Inter', sans-serif; text-transform: uppercase; transition: var(--theme-transition); }
header { padding: 28px 0 0; border-bottom: 2px solid var(--text-primary); position: relative; z-index: 1000; background: var(--bg-primary); transition: var(--theme-transition); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border-primary); transition: var(--theme-transition); }
.date-line { font-size: 14px; color: var(--text-secondary); font-family: 'Sarabun', sans-serif; font-weight: 500; letter-spacing: 0.5px; width: 180px; transition: var(--theme-transition); }
.logo-block { text-align: center; flex: 1; }
.logo-en { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1; color: inherit; }
.logo-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--text-secondary); direction: rtl; margin-top: 6px; line-height: 1.5; transition: var(--theme-transition); }
.header-right { width: 160px; display: flex; justify-content: flex-end; align-items: center; }
.spacer { width: 100%; }
.menu-toggle { display: none !important; }
nav { display: flex; justify-content: center; margin-top: 12px; transition: var(--theme-transition); }
.nav-item { font-size: 13px; font-weight: 500; padding: 10px 20px; color: var(--text-secondary); border-right: 1px solid var(--border-primary); cursor: pointer; transition: var(--theme-transition); }
.nav-item:first-child { border-left: 1px solid var(--border-primary); }
.nav-item:hover { color: var(--text-primary); }
.nav-item.active { color: var(--text-primary); border-bottom: 2px solid var(--text-primary); }
footer { background: var(--footer-bg); color: var(--inverted-text); padding: 40px 0 24px; border-top: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; text-align: center; }
.footer-logo { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; color: var(--inverted-text); transition: var(--theme-transition); }
.footer-ar { font-family: 'Amiri', serif; font-size: 17px; color: var(--text-quaternary); direction: rtl; margin-bottom: 28px; line-height: 1.6; transition: var(--theme-transition); }
.footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-links a { font-size: 13px; color: #bbbbbb; letter-spacing: .5px; transition: var(--theme-transition); text-decoration: none; }
.footer-links a:hover { color: var(--inverted-text); }
.footer-copy { font-family: 'Inter', sans-serif; font-size: 14px; color: #888888; font-style: normal; letter-spacing: 0.5px; transition: var(--theme-transition); }

@media(max-width:768px){
  .logo-en { font-size: 38px; }
  .logo-ar { font-size: 14px; }
  .date-line { display: none; }
  .header-right { width: auto; }
  .spacer { display: none; }
  .menu-toggle { display: block !important; font-size: 24px; cursor: pointer; color: var(--text-primary); transition:var(--theme-transition); }
  nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-primary); box-shadow: 0 10px 20px var(--shadow-color); margin-top: 0; padding: 10px 0; border-bottom: 2px solid var(--text-primary); transition:var(--theme-transition); }
  nav.mobile-active { display: flex; }
  .nav-item { border: none !important; border-bottom: 1px solid var(--border-secondary) !important; padding: 16px 24px; font-size: 16px; text-align: left; }
  .nav-item:last-child { border-bottom: none !important; }
  .nav-item.active { background: var(--bg-secondary); border-bottom: 1px solid var(--border-secondary) !important; border-left: 4px solid var(--text-primary) !important; }
  .works-hero { padding: 96px 20px 44px; }
  .works-wrap { padding: 40px 18px 72px; }
  #works-grid { grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 26px 18px; }
}
</style>

<script>
(function(){
  var bar = document.getElementById('readingProgress');
  if(bar){
    window.addEventListener('scroll',function(){
      var st = document.documentElement.scrollTop;
      var sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      bar.style.width = (sh > 0 ? (st/sh*100) : 0) + '%';
    });
  }
  window.addEventListener('scroll',function(){
    var btn = document.getElementById('backToTopBtn');
    if(!btn) return;
    btn.style.display = (document.documentElement.scrollTop > 400) ? 'grid' : 'none';
  });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('is-in'); io.unobserve(en.target); } });
  },{threshold:.12});
  document.querySelectorAll('[data-reveal]').forEach(function(el){
    var r = el.getBoundingClientRect();
    if(r.top < window.innerHeight && r.bottom > 0){ el.classList.add('is-in'); }
    else { io.observe(el); }
  });
})();
</script>
<script>
(function(){
  var grid = document.getElementById('works-grid');
  if(!grid) return;

  var lbState = { imgs: [], idx: 0 };
  var lbOverlay = document.getElementById('lbOverlay');
  var lbImg = document.getElementById('lbImg');
  var lbCounter = document.getElementById('lbCounter');

  function lbRender(){
    if(!lbState.imgs.length) return;
    lbImg.src = lbState.imgs[lbState.idx];
    lbImg.alt = 'ตัวอย่างหน้า ' + (lbState.idx + 1);
    lbCounter.textContent = (lbState.idx + 1) + ' / ' + lbState.imgs.length;
  }
  function lbOpen(imgs, start){
    lbState.imgs = imgs;
    lbState.idx = start || 0;
    lbRender();
    lbOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function lbClose(){
    lbOverlay.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }
  function lbStep(d){
    if(!lbState.imgs.length) return;
    lbState.idx = (lbState.idx + d + lbState.imgs.length) % lbState.imgs.length;
    lbRender();
  }
  document.getElementById('lbClose').addEventListener('click', lbClose);
  document.getElementById('lbPrev').addEventListener('click', function(){ lbStep(-1); });
  document.getElementById('lbNext').addEventListener('click', function(){ lbStep(1); });
  lbOverlay.addEventListener('click', function(e){ if(e.target === lbOverlay) lbClose(); });
  document.addEventListener('keydown', function(e){
    if(!lbOverlay.classList.contains('open')) return;
    if(e.key === 'Escape') lbClose();
    else if(e.key === 'ArrowLeft') lbStep(-1);
    else if(e.key === 'ArrowRight') lbStep(1);
  });

  function el(tag, cls, text){
    var n = document.createElement(tag);
    if(cls) n.className = cls;
    if(text != null) n.textContent = text;
    return n;
  }

  function renderCard(b){
    var card = el('article', 'work-card' + (b.status === 'in-progress' ? ' is-progress' : ''));

    var coverWrap = el('div', 'work-cover-wrap');
    var badge = el('span', 'work-badge ' + (b.status === 'in-progress' ? 'in-progress' : 'published'),
      b.status === 'in-progress' ? 'กำลังเขียน' : 'เผยแพร่แล้ว');
    coverWrap.appendChild(badge);
    var img = el('img', 'work-cover');
    img.src = b.cover;
    img.alt = b.title;
    img.loading = 'lazy';
    img.width = 300;
    img.height = 400;
    coverWrap.appendChild(img);
    card.appendChild(coverWrap);

    var body = el('div', 'work-body');
    body.appendChild(el('h2', 'work-title', b.title));
    if(b.subtitle) body.appendChild(el('div', 'work-subtitle', b.subtitle));
    if(b.year) body.appendChild(el('div', 'work-year', b.year));
    if(b.synopsis) body.appendChild(el('p', 'work-synopsis', b.synopsis));

    if(b.status !== 'in-progress' && Array.isArray(b.preview) && b.preview.length > 0){
      var btn = el('button', 'work-preview-btn', 'ดูตัวอย่าง');
      var imgs = b.preview.slice();
      btn.addEventListener('click', function(){ lbOpen(imgs, 0); });
      body.appendChild(btn);
    }

    card.appendChild(body);
    return card;
  }

  fetch('/works.json')
    .then(function(r){ return r.json(); })
    .then(function(list){
      if(!Array.isArray(list) || !list.length){
        grid.innerHTML = '';
        var empty = el('div', 'works-empty', 'ยังไม่มีผลงานเผยแพร่ในขณะนี้');
        grid.appendChild(empty);
        return;
      }
      list.sort(function(a, b){ return (a.order || 0) - (b.order || 0); });
      var frag = document.createDocumentFragment();
      list.forEach(function(b){ frag.appendChild(renderCard(b)); });
      grid.appendChild(frag);
    })
    .catch(function(){
      grid.innerHTML = '';
      grid.appendChild(el('div', 'works-empty', 'ไม่สามารถโหลดรายการผลงานได้ในขณะนี้'));
    });
})();
</script>
</body>
</html>
