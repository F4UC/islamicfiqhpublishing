  })();

<style>
/* --- Fixed Dark Palette — all colors resolve via css/tokens.css (white + red on ink) --- */
:root {
  --bg-primary: var(--ink);
  --bg-secondary: var(--ink-2);
  --bg-tertiary: var(--ink-3);
  --text-primary: var(--heading);
  --text-secondary: var(--text);
  --text-tertiary: var(--muted);
  --text-quaternary: var(--faint);
  --border-primary: var(--line);
  --border-secondary: var(--line-strong);
  --ink-4: var(--line-strong);
  --paper: var(--heading); --paper-2: var(--text);
  --bone: var(--muted); --text-dim: var(--text); --text-mute: var(--muted);
  --gold: var(--accent-deep); --gold-bright: var(--accent);
  --rule: var(--line); --rule-strong: var(--line-strong);
  --accent-color: var(--accent-deep);
  --inverted-bg: var(--ink-2); --inverted-text: var(--heading);
  --footer-bg: #050403; --footer-border: var(--line-strong);
  --shadow-color: rgba(0,0,0,0.4); --shadow-heavy: rgba(0,0,0,0.6);
  --theme-transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
}
#themeToggleBtn { display: none !important; }

/* --- 1. สไตล์พื้นฐาน --- */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun',sans-serif;
  color:var(--text-primary);
  background:var(--bg-primary);
  font-size:16px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  transition:var(--theme-transition);
}
a{text-decoration:none;color:inherit;transition:color 0.2s ease;}

/* ─── PAGE HERO (Ken Burns · 6 slides) ──────────────────── */
:root{--ph-paper:var(--heading);--ph-dim:var(--text);--ph-gold:var(--accent-deep);--ph-serif:'IBM Plex Sans Thai', system-ui, sans-serif;--ph-thai:'Sarabun',sans-serif}
.page-hero{position:relative;height:100vh;overflow:hidden;background:var(--ink,#0a0907)}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.hero-slide-1{opacity:1;animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:0s,0s}
.hero-slide-2{animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:7.5s,0s}
.hero-slide-3{animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:15s,0s}
.hero-slide-4{animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:22.5s,0s}
.hero-slide-5{animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:30s,0s}
.hero-slide-6{animation:hero-fade 45s linear infinite,ken-burns 8s ease-in-out infinite alternate;animation-delay:37.5s,0s}
.page-hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.35) 50%,rgba(0,0,0,0) 100%)}
.page-hero-inner{position:absolute;left:60px;bottom:120px;max-width:560px;z-index:3;text-align:left}
.page-display{font-family:var(--ph-serif);font-weight:400;font-size:clamp(3rem,6vw,7rem);line-height:1.05;letter-spacing:-.01em;white-space:nowrap;color:#f5f1ea;text-shadow:0 2px 24px rgba(0,0,0,0.6)}
.page-display em{font-style:normal;font-weight:700;color:#d32f2f;letter-spacing:-0.02em}
.page-display .br{display:inline}
.page-hero-sub{max-width:560px;margin:18px 0 0;font-family:var(--ph-thai);font-weight:400;font-size:16px;line-height:1.8;color:rgba(245,241,234,0.82);text-shadow:0 1px 12px rgba(0,0,0,0.7)}
.hero-scroll-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;animation:hero-bounce 2s ease-in-out infinite;z-index:4;cursor:pointer}
.hero-scroll-line{width:1px;height:28px;background:rgba(255,255,255,0.5)}
@keyframes ken-burns{0%{transform:scale(1)}100%{transform:scale(1.08)}}
@keyframes hero-fade{0%{opacity:1}13.33%{opacity:1}16.67%{opacity:0}100%{opacity:0}}
@keyframes hero-bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@media(max-width:640px){.page-hero-inner{left:24px;bottom:90px}.page-display{font-size:clamp(36px,10vw,60px);white-space:normal}}
@media(prefers-reduced-motion:reduce){.hero-slide{animation:none}.hero-scroll-hint{animation:none}}

/* --- Reading-time filter chips (articles page only) --- */
.rt-filter { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 36px 48px 0; }
.rt-chip { font-family: 'IBM Plex Sans Thai', system-ui, sans-serif; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); background: transparent; border: 1px solid rgba(255,255,255,0.22); border-radius: 999px; padding: 9px 20px; cursor: pointer; transition: color .25s ease, background .25s ease, border-color .25s ease; -webkit-tap-highlight-color: transparent; }
.rt-chip:hover { color: #ffffff; border-color: rgba(255,255,255,0.45); }
.rt-chip.active { color: #1a1410; background: #c49a45; border-color: #c49a45; font-weight: 600; }
.rt-chip:focus-visible { outline: 2px solid #c49a45; outline-offset: 2px; }
@media(max-width:768px) {
  .rt-filter { gap: 8px; padding: 28px 24px 0; }
  .rt-chip { font-size: 12px; padding: 7px 14px; }
}

/* ========================================== */
/* CSS สำหรับเมนูและ Footer ที่จะถูกดึงเข้ามา */

.topbar { background: var(--inverted-bg); color: var(--inverted-text); text-align: center; font-size: 11px; letter-spacing: 2px; padding: 8px; font-family: 'Inter', sans-serif; text-transform: uppercase; transition: var(--theme-transition); }
header { padding: 28px 0 0; border-bottom: 2px solid var(--text-primary); position: relative; z-index: 1000; background: var(--bg-primary); transition: var(--theme-transition); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border-primary); transition: var(--theme-transition); }
.date-line { font-size: 14px; color: var(--text-secondary); font-family: 'Sarabun', sans-serif; font-weight: 500; letter-spacing: 0.5px; width: 180px; transition: var(--theme-transition); }
.logo-block { text-align: center; flex: 1; }
.logo-en { font-family: 'Inter', sans-serif; font-size: 38px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1; color: inherit; }
.logo-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--text-secondary); direction: rtl; margin-top: 6px; line-height: 1.5; transition: var(--theme-transition); }
.header-right { width: 160px; display: flex; justify-content: flex-end; align-items: center; }
.spacer { width: 100%; }
.menu-toggle { display: none !important; } 
nav { display: flex; justify-content: center; margin-top: 12px; transition: var(--theme-transition); }
.nav-item { font-size: 13px; font-weight: 500; padding: 10px 20px; color: var(--text-secondary); border-right: 1px solid var(--border-primary); cursor: pointer; transition: var(--theme-transition); }
.nav-item:first-child { border-left: 1px solid var(--border-primary); }
.nav-item:hover { color: var(--text-primary); }
.nav-item.active { color: var(--text-primary); border-bottom: 2px solid var(--text-primary); }
footer { background: var(--footer-bg); color: var(--inverted-text); padding: 40px 0 24px; border-top: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; text-align: center; }
.footer-logo { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; color: var(--inverted-text); transition: var(--theme-transition); }
.footer-ar { font-family: 'Amiri', serif; font-size: 17px; color: var(--text-quaternary); direction: rtl; margin-bottom: 28px; line-height: 1.6; transition: var(--theme-transition); }
.footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--footer-border); transition: var(--theme-transition); }
.footer-links a { font-size: 13px; color: #bbbbbb; letter-spacing: .5px; transition: var(--theme-transition); text-decoration: none; }
.footer-links a:hover { color: var(--inverted-text); }
.footer-copy { font-family: 'Inter', sans-serif; font-size: 14px; color: #888888; font-style: normal; letter-spacing: 0.5px; transition: var(--theme-transition); }
@media(max-width:768px){
  .logo-en { font-size: 38px; }
  .logo-ar { font-size: 14px; }
  .date-line { display: none; }
  .header-right { width: auto; }
  .spacer { display: none; }
  .menu-toggle { display: block !important; font-size: 24px; cursor: pointer; color: var(--text-primary); transition:var(--theme-transition); }
  nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-primary); box-shadow: 0 10px 20px var(--shadow-color); margin-top: 0; padding: 10px 0; border-bottom: 2px solid var(--text-primary); transition:var(--theme-transition); }
  nav.mobile-active { display: flex; } 
  .nav-item { border: none !important; border-bottom: 1px solid var(--border-secondary) !important; padding: 16px 24px; font-size: 16px; text-align: left; }
  .nav-item:last-child { border-bottom: none !important; }
  .nav-item.active { background: var(--bg-secondary); border-bottom: 1px solid var(--border-secondary) !important; border-left: 4px solid var(--text-primary) !important; }
}
</style>
</head>

<script>
(function(){
  var bar = document.getElementById('readingProgress');
  if(bar){
    window.addEventListener('scroll',function(){
      var st = document.documentElement.scrollTop;
      var sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      bar.style.width = (sh > 0 ? (st/sh*100) : 0) + '%';
    });
  }
  window.addEventListener('scroll',function(){
    var btn = document.getElementById('backToTopBtn');
    if(!btn) return;
    btn.style.display = (document.documentElement.scrollTop > 400) ? 'grid' : 'none';
  });
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('is-in'); io.unobserve(en.target); } });
  },{threshold:.12});
  document.querySelectorAll('[data-reveal]').forEach(function(el){
    var r = el.getBoundingClientRect();
    if(r.top < window.innerHeight && r.bottom > 0){ el.classList.add('is-in'); }
    else { io.observe(el); }
  });
  document.querySelector('.hero-scroll-hint')?.addEventListener('click', function() {
    window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
  });
})();
</script>

<script>
/* Reading-time filter chips — articles page only. CSP-safe (addEventListener, no inline onclick).
   Reads minutes from each rendered .idx-read cell; does NOT touch main.js render logic or articles.json.
   Cards are appended asynchronously by main.js, so re-apply on list mutation. */
(function(){
  var listEl = document.getElementById('articleList');
  var chips = Array.prototype.slice.call(document.querySelectorAll('.rt-chip'));
  if (!listEl || !chips.length) return;
  var currentMin = 0;

  function rowMinutes(row){
    var el = row.querySelector('.idx-read');
    var m = el && el.textContent.match(/\d+/);
    return m ? parseInt(m[0], 10) : NaN;
  }
  function applyFilter(){
    var rows = listEl.querySelectorAll('.idx-row');
    var visible = 0;
    Array.prototype.forEach.call(rows, function(row){
      var mins = rowMinutes(row);
      var show = currentMin === 0 || (!isNaN(mins) && mins >= currentMin);
      row.style.display = show ? '' : 'none';
      if (show) {
        visible++;
        var num = row.querySelector('.idx-num');
        if (num) num.textContent = String(visible).padStart(2, '0');
      }
    });
  }
  chips.forEach(function(chip){
    chip.addEventListener('click', function(){
      currentMin = parseInt(chip.getAttribute('data-min'), 10) || 0;
      chips.forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      applyFilter();
    });
  });
  new MutationObserver(applyFilter).observe(listEl, { childList: true });
  if (listEl.querySelector('.idx-row')) applyFilter();
})();
</script>

<script>/* hydrate non-initial hero slides during idle after DOMContentLoaded — slide-1 still loads eager+priority first, but slides 2-N are requested well before the 7.5s fade-in regardless of window load timing */
(function(){function h(){document.querySelectorAll(".hero-slide picture").forEach(function(p){var s=p.querySelector("source[data-srcset]");if(s){s.srcset=s.dataset.srcset;}var i=p.querySelector("img[data-src]");if(i){i.src=i.dataset.src;}});}var ric=window.requestIdleCallback||function(f){return setTimeout(f,1);};if(document.readyState!=="loading"){ric(h,{timeout:1500});}else{addEventListener("DOMContentLoaded",function(){ric(h,{timeout:1500});});}})();</script>
