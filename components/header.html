<style>
:root {
  --header-bg: rgba(251,251,250,0.92);
  --header-text: #111111;
  --header-text-dim: #555555;
  --header-border: #eaeaea;
  --header-icon-border: rgba(0,0,0,0.1);
}
html.dark-mode {
  --header-bg: rgba(10,9,7,0.92);
  --header-text: #e8e0d0;
  --header-text-dim: #9a907e;
  --header-border: rgba(232,224,208,0.14);
  --header-icon-border: rgba(232,224,208,0.32);
}

.chrome {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--header-text-dim);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.chrome-inner {
  max-width: 1440px; margin: 0 auto; padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.chrome-mark {
  display: flex; align-items: center; gap: 14px;
  color: var(--header-text); text-decoration: none; flex-shrink: 0;
  transition: color 0.3s;
}
.chrome-seal {
  width: 22px; height: 22px; border: 1px solid #c49a45; border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px;
  color: #c49a45; font-style: italic;
}
.chrome-brand { font-weight: 500; letter-spacing: .16em; font-size: 11px; }

nav.chrome-nav { display: flex; gap: 28px; }
nav.chrome-nav .nav-item {
  position: relative; color: var(--header-text-dim);
  transition: color .25s; font-size: 11px;
  letter-spacing: .18em; text-transform: uppercase; text-decoration: none;
  border: none; background: none; cursor: pointer;
}
nav.chrome-nav .nav-item:hover,
nav.chrome-nav .nav-item.active { color: var(--header-text); }
nav.chrome-nav .nav-item::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -6px;
  height: 1px; background: #c49a45;
  transform: scaleX(0); transform-origin: left;
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
}
nav.chrome-nav .nav-item:hover::after,
nav.chrome-nav .nav-item.active::after { transform: scaleX(1); }

.chrome-right { display: flex; align-items: center; gap: 14px; }
.chrome-time { color: var(--header-text); font-size: 11px; letter-spacing: .18em; transition: color 0.3s; }

.chrome-icon-btn {
  width: 32px; height: 32px; display: grid; place-items: center;
  border: 1px solid var(--header-icon-border); border-radius: 50%;
  color: var(--header-text-dim); background: transparent; cursor: pointer;
  transition: all .25s; padding: 0; flex-shrink: 0;
}
.chrome-icon-btn:hover { border-color: #c49a45; color: #c49a45; transform: rotate(8deg); }

.chrome-hamburger {
  display: none; font-size: 20px; cursor: pointer;
  color: var(--header-text); background: transparent; border: 0; padding: 4px;
  transition: color 0.3s;
}
.chrome-spacer { height: 51px; }

@media (max-width: 980px) {
  nav.chrome-nav { display: none; }
  .chrome-hamburger { display: block; }
  .chrome-time { display: none; }
}
nav.chrome-nav.mobile-active {
  display: flex; flex-direction: column;
  position: fixed; top: 51px; left: 0; right: 0;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--header-border);
  padding: 20px 40px 24px; gap: 0; z-index: 999;
}
nav.chrome-nav.mobile-active .nav-item {
  padding: 14px 0; border-bottom: 1px solid var(--header-border) !important;
  font-size: 13px; letter-spacing: .14em;
}
nav.chrome-nav.mobile-active .nav-item:last-child { border-bottom: none !important; }
nav.chrome-nav.mobile-active .nav-item.active {
  color: #c49a45; border-bottom: 1px solid var(--header-border) !important;
}

/* ==========================================================
   Search Overlay — Glassmorphic Instant Search Modal
   ========================================================== */
.search-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(10,9,7,.65);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 999999; opacity: 0; pointer-events: none;
  transition: opacity .3s cubic-bezier(.4,0,.2,1);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 60px 24px;
}
.search-overlay.active { opacity: 1; pointer-events: auto; }
.search-container {
  width: 100%; max-width: 680px;
  transform: translateY(-20px);
  transition: transform .35s cubic-bezier(.16,1,.3,1);
}
.search-overlay.active .search-container { transform: translateY(0); }
.search-modal-card {
  background: #ffffff; border: 1px solid #eaeaea; border-radius: 12px;
  box-shadow: 0 30px 60px rgba(0,0,0,.12); overflow: hidden;
  display: flex; flex-direction: column; max-height: calc(100vh - 120px);
}
html.dark-mode .search-modal-card {
  background: #181818; border-color: #2a2a2a; box-shadow: 0 30px 60px rgba(0,0,0,.4);
}
.search-modal-header {
  padding: 20px 24px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid #eee;
}
html.dark-mode .search-modal-header { border-bottom-color: #2a2a2a; }
.search-modal-title {
  font-family: 'Sarabun', sans-serif; font-size: 18px; font-weight: 700; color: #0a0a0a;
}
html.dark-mode .search-modal-title { color: #fff; }
.search-close-btn {
  background: transparent; border: none; font-size: 28px; line-height: .5;
  cursor: pointer; color: #888; padding: 8px; border-radius: 4px; transition: all .2s;
}
.search-close-btn:hover { color: #0a0a0a; background: rgba(0,0,0,.05); }
html.dark-mode .search-close-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.search-input-field-wrapper {
  padding: 16px 24px; display: flex; align-items: center; gap: 14px;
  background: #fafafa; border-bottom: 1px solid #eee;
}
html.dark-mode .search-input-field-wrapper { background: #1e1e1e; border-bottom-color: #2a2a2a; }
.search-input-icon { color: #888; flex-shrink: 0; display: flex; align-items: center; }
.search-input {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: 'Sarabun', sans-serif; font-size: 16px; color: #0a0a0a;
}
html.dark-mode .search-input { color: #fff; }
.search-input::placeholder { color: #999; }
.search-results-list { overflow-y: auto; padding: 8px 0; }
.search-empty-state { padding: 40px 24px; text-align: center; color: #666; }
html.dark-mode .search-empty-state { color: #aaa; }
.search-empty-state .empty-icon { font-size: 32px; display: block; margin-bottom: 12px; }
.search-empty-state p { font-size: 14px; margin-bottom: 8px; font-family: 'Sarabun', sans-serif; }
.search-empty-state .keyboard-tip { font-size: 11px; color: #999; }
.search-empty-state code { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
html.dark-mode .search-empty-state code { background: #333; color: #eee; }
.search-result-item {
  padding: 16px 24px; display: flex; flex-direction: column; gap: 6px;
  border-bottom: 1px solid #f5f5f5; transition: background .2s, padding-left .2s;
  text-decoration: none; color: inherit;
}
html.dark-mode .search-result-item { border-bottom-color: #222; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: #fdfbf7; padding-left: 32px; }
html.dark-mode .search-result-item:hover { background: #222; }
.search-result-cat-wrapper { display: flex; justify-content: space-between; align-items: center; }
.search-result-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #888; }
.search-result-title { font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; color: #0a0a0a; line-height: 1.4; }
html.dark-mode .search-result-title { color: #fff; }
.search-result-excerpt { font-size: 13px; color: #666; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
html.dark-mode .search-result-excerpt { color: #aaa; }
.search-highlight { background: rgba(253,186,116,.3); border-radius: 2px; padding: 0 2px; }
html.dark-mode .search-highlight { background: rgba(249,115,22,.4); }

/* ==========================================================
   Universal Dark Mode Overrides — Article / Category Pages

html.dark-mode .page-btn:hover { border-color: #fff !important; color: #fff !important; }
html.dark-mode .page-btn.active { background: #fff !important; border-color: #fff !important; color: #000 !important; }
html.dark-mode .page-btn:disabled { border-color: #222 !important; color: #444 !important; }
html.dark-mode #backToTopBtn { background: #fff !important; color: #000 !important; border-color: #fff !important; }
html.dark-mode footer { background: #050403 !important; border-top: 1px solid rgba(232,224,208,.14) !important; }
html.dark-mode .results-header { color: #fff !important; border-bottom-color: #fff !important; }
html.dark-mode .article-item { border-bottom-color: #222 !important; }
html.dark-mode .article-item:hover { border-color: #2a2a2a !important; background: #1a1a1a !important; }
html.dark-mode .item-title { color: #fff !important; }
html.dark-mode .item-cat { color: #aaa !important; }
html.dark-mode .item-excerpt { color: #bbb !important; }
html.dark-mode .read-more-link { color: #fff !important; }

@media (max-width: 768px) {
  .search-overlay { padding: 20px 12px; }
  .search-modal-card { max-height: calc(100vh - 40px); }
  .chrome-inner { padding: 14px 20px; }
  nav.chrome-nav.mobile-active { padding: 20px 20px 24px; }
}
</style>
