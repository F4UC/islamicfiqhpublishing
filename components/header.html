<style>
/* ============================================================
   CHROME NAV — Antigravity Glass Style
   Islamic Fiqh Publishing
   All vars are hardcoded for cross-page compatibility.
   ============================================================ */

/* Reading Progress Bar */
#readingProgress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  width: 0%;
  background: #c49a45;
  z-index: 301;
  transition: width 0.1s linear;
  pointer-events: none;
}

/* Chrome nav container */
.chrome {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  z-index: 300;
  background: rgba(248, 245, 239, 0.92);
  border-bottom: 1px solid rgba(10, 9, 7, 0.10);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  transition: background 0.3s ease, border-color 0.3s ease;
}

html.dark-mode .chrome {
  background: rgba(10, 9, 7, 0.90);
  border-bottom: 1px solid rgba(232, 224, 208, 0.10);
}

.chrome-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  gap: 24px;
}

/* Logo / Mark */
.chrome-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.seal {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1.5px solid #c49a45;
  font-family: 'Amiri', serif;
  font-size: 14px;
  color: #c49a45;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.2s ease, color 0.2s ease;
}

.chrome-mark:hover .seal {
  background: #c49a45;
  color: #fff;
}

.mark-name {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #0a0907;
  white-space: nowrap;
  transition: color 0.2s ease;
}

html.dark-mode .mark-name {
  color: #e8e0d0;
}

/* Center Nav */
#navMenu {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  justify-content: center;
}

.nav-item {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #6b6760;
  text-decoration: none;
  padding: 6px 10px;
  position: relative;
  white-space: nowrap;
  transition: color 0.2s ease;
}

html.dark-mode .nav-item {
  color: #9a9590;
}

.nav-item::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 10px;
  right: 10px;
  height: 1.5px;
  background: #c49a45;
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-item:hover {
  color: #c49a45;
}

.nav-item:hover::after {
  transform: scaleX(1);
}

.nav-item.active {
  color: #c49a45;
}

.nav-item.active::after {
  transform: scaleX(1);
}

/* Right side controls */
.chrome-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.chrome-time {
  font-family: 'Inter', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #9a9590;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  user-select: none;
}

html.dark-mode .chrome-time {
  color: #6b6760;
}

/* Icon buttons (theme toggle, hamburger) */
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid rgba(10, 9, 7, 0.14);
  background: transparent;
  cursor: pointer;
  color: #0a0907;
  font-size: 16px;
  line-height: 1;
  padding: 0;
  transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  flex-shrink: 0;
}

.icon-btn:hover {
  border-color: #c49a45;
  color: #c49a45;
  transform: scale(1.05);
}

html.dark-mode .icon-btn {
  border-color: rgba(232, 224, 208, 0.18);
  color: #e8e0d0;
}

html.dark-mode .icon-btn:hover {
  border-color: #c49a45;
  color: #c49a45;
}

/* Hamburger — hidden on desktop, shown on mobile */
.mobile-only {
  display: none;
}

/* Mobile nav dropdown */
.chrome-mobile-nav {
  display: none;
  flex-direction: column;
  background: rgba(248, 245, 239, 0.97);
  border-top: 1px solid rgba(10, 9, 7, 0.08);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html.dark-mode .chrome-mobile-nav {
  background: rgba(14, 12, 10, 0.97);
  border-top-color: rgba(232, 224, 208, 0.08);
}

.chrome-mobile-nav.open {
  max-height: 400px;
}

.chrome-mobile-nav .nav-item {
  display: block;
  padding: 14px 24px;
  border-bottom: 1px solid rgba(10, 9, 7, 0.06);
  font-size: 12px;
  letter-spacing: 0.18em;
}

html.dark-mode .chrome-mobile-nav .nav-item {
  border-bottom-color: rgba(232, 224, 208, 0.06);
}

.chrome-mobile-nav .nav-item::after {
  display: none;
}

.chrome-mobile-nav .nav-item.active {
  color: #c49a45;
  border-left: 2px solid #c49a45;
  padding-left: 22px;
}

/* Responsive breakpoint */
@media (max-width: 979px) {
  #navMenu {
    display: none;
  }
  .mobile-only {
    display: flex;
  }
  .chrome-mobile-nav {
    display: flex;
  }
  .chrome-time {
    display: none;
  }
}

@media (max-width: 479px) {
  .chrome-inner {
    padding: 0 16px;
  }
  .mark-name {
    font-size: 10px;
    letter-spacing: 0.1em;
  }
}
</style>

<div id="readingProgress"></div>
<header class="chrome" id="siteChrome">
  <div class="chrome-inner">
    <a href="/" class="chrome-mark" aria-label="Islamic Fiqh Publishing — หน้าแรก">
      <span class="seal" lang="ar" aria-hidden="true">ق</span>
      <span class="mark-name">Islamic Fiqh Publishing</span>
    </a>
    <nav id="navMenu" role="navigation" aria-label="เมนูหลัก">
      <a href="/" class="nav-item">หน้าแรก</a>
      <a href="/pages/nitisart.html" class="nav-item">นิติศาสตร์</a>
      <a href="/pages/kalam.html" class="nav-item">กะลาม</a>
      <a href="/pages/hadith.html" class="nav-item">หะดีษ</a>
      <a href="/pages/history.html" class="nav-item">ประวัติศาสตร์</a>
      <a href="/pages/tools.html" class="nav-item">เครื่องมือ</a>
    </nav>
    <div class="chrome-right">
      <span class="chrome-time" id="navClock" aria-label="เวลากรุงเทพ"></span>
      <button id="themeToggleBtn" class="icon-btn" aria-label="สลับธีม" title="สลับธีม"></button>
      <button id="mobileMenuBtn" class="icon-btn mobile-only" aria-label="เมนู" title="เปิดเมนู" aria-expanded="false" aria-controls="chromeMobileNav">☰</button>
    </div>
  </div>
  <div class="chrome-mobile-nav" id="chromeMobileNav" role="navigation" aria-label="เมนูมือถือ">
    <a href="/" class="nav-item">หน้าแรก</a>
    <a href="/pages/nitisart.html" class="nav-item">นิติศาสตร์</a>
    <a href="/pages/kalam.html" class="nav-item">กะลาม</a>
    <a href="/pages/hadith.html" class="nav-item">หะดีษ</a>
    <a href="/pages/history.html" class="nav-item">ประวัติศาสตร์</a>
    <a href="/pages/tools.html" class="nav-item">เครื่องมือ</a>
  </div>
</header>

<script>
(function () {
  /* ----------------------------------------------------------
     Active nav link highlighting
  ---------------------------------------------------------- */
  var path = window.location.pathname;
  var allNavItems = document.querySelectorAll('.nav-item');
  allNavItems.forEach(function (a) {
    var href = a.getAttribute('href');
    if (href === '/' && (path === '/' || path === '/index.html')) {
      a.classList.add('active');
    } else if (href !== '/' && path.indexOf(href) === 0) {
      a.classList.add('active');
    }
  });

  /* ----------------------------------------------------------
     Bangkok time clock
  ---------------------------------------------------------- */
  function updateClock() {
    var el = document.getElementById('navClock');
    if (!el) return;
    var now = new Date();
    try {
      var bkk = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Bangkok',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(now);
      el.textContent = 'BKK ' + bkk;
    } catch (e) {
      el.textContent = '';
    }
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ----------------------------------------------------------
     Reading progress bar
  ---------------------------------------------------------- */
  window.addEventListener('scroll', function () {
    var bar = document.getElementById('readingProgress');
    if (!bar) return;
    var doc = document.documentElement;
    var scrolled = doc.scrollTop || document.body.scrollTop;
    var total = doc.scrollHeight - doc.clientHeight;
    bar.style.width = (total > 0 ? (scrolled / total) * 100 : 0) + '%';
  }, { passive: true });

  /* ----------------------------------------------------------
     Mobile hamburger menu toggle
  ---------------------------------------------------------- */
  var mobileBtn = document.getElementById('mobileMenuBtn');
  var mobileNav = document.getElementById('chromeMobileNav');
  if (mobileBtn && mobileNav) {
    mobileBtn.addEventListener('click', function () {
      var isOpen = mobileNav.classList.toggle('open');
      mobileBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      mobileBtn.textContent = isOpen ? '✕' : '☰';
    });
    /* Close on nav item click */
    mobileNav.querySelectorAll('.nav-item').forEach(function (a) {
      a.addEventListener('click', function () {
        mobileNav.classList.remove('open');
        mobileBtn.setAttribute('aria-expanded', 'false');
        mobileBtn.textContent = '☰';
      });
    });
  }
})();
</script>
