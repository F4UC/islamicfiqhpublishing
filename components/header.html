/* ==========================================================
   Desktop SpaceX/Tesla Nav — min-width: 1024px
   ========================================================== */
@media (min-width: 1024px) {

  .chrome {
    background: transparent;

  /* Top-fade gradient: darkens hero behind nav text */
  .chrome::before {
    content: '';

    top: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);

  /* 3-column inner grid — FIQH + nav left-cluster, search far-right */

    display: grid;

    align-items: center;
    padding: 0 48px;
    height: 72px;
    gap: 40px;
    position: relative;
    z-index: 1;
  }

  /* Hide full brand name — removes it from grid flow, leaving 3 items */
  .chrome-mark { display: none; }

  /* LEFT: show FIQH wordmark */

  .chrome-time { display: none; }
  .chrome-wordmark { display: block; font-size: 28px; }

    flex-direction: row;
    position: static;
    background: transparent;
    border: none;
    padding: 0;
    margin-top: 0;
    gap: 28px;
    align-items: center;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    justify-content: flex-start;
  }
  nav.chrome-nav .nav-item {

    line-height: 1;
    color: rgba(255,255,255,0.85);
    padding: 0;
    border-bottom: none !important;
  }
  nav.chrome-nav .nav-item:hover,
  nav.chrome-nav .nav-item.active { color: #ffffff; }

  /* RIGHT: inline search wrapper + hide magnifier button */

  #themeToggleBtn { display: none; }
  .chrome-hamburger { display: none !important; }

  .chrome-spacer { height: 0; }

  /* Hide cat-nav injected by main.js */
  #catNavBtn,
  #catNavDropdown,
  #catNavPanel,
  #catNavTab,
  #catNavOverlay { display: none !important; }

  /* Scroll-aware: frosted glass once user leaves top of page */
  .chrome--scrolled {
    background: rgba(10,9,7,0.88) !important;
    backdrop-filter: blur(22px) saturate(1.3) !important;
    -webkit-backdrop-filter: blur(22px) saturate(1.3) !important;
    border-bottom: 1px solid rgba(255,255,255,0.07) !important;
  }
  .chrome--scrolled::before {
    opacity: 0;
  }
}
